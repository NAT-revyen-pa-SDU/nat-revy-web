<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilmeld - NAT Revyen</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<section class="about contact-page">
    <div class="about-inner contact-layout">
        <div class="about-text-wrapper contact-simple">
            <h2>Tilmeld</h2>
            <p>Vi leder hele tiden efter nye medlemmer. Du kan tilmelde dig via NemTilmeld, og hvis du har spørgsmål,
                kan du skrive til os eller kontakte os på Facebook.</p>
            <div class="contact-panel">
                <div class="contact-item">
                    <h3>E-mail</h3>
                    <a class="contact-link" href="mailto:natrevy@org.sdu.dk">natrevy@org.sdu.dk</a>
                </div>

                <div class="contact-item">
                    <h3>Facebook</h3>
                    <a class="contact-link" href="https://www.facebook.com/profile.php?id=61552933400622"
                       target="_blank" rel="noopener noreferrer">Besøg vores Facebook</a>
                </div>

                <a href="https://sdusnatrevy.nemtilmeld.dk/" class="btn-cta" target="_blank" rel="noopener noreferrer">Gå
                    til NemTilmeld</a>
            </div>

        </div>

        <div class="about-images contact-media">
            <img src="images/dyt-baat.jpg" alt="NAT Revy forestilling">
        </div>
    </div>
</section>

<div id="footer"></div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const hamburger = document.getElementById("hamburger");
                const mobileMenu = document.getElementById("mobileMenu");

                if (hamburger) {
                    hamburger.addEventListener("click", () => {
                        mobileMenu.classList.toggle("active");
                    });
                }
            });

        fetch("footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
    });
</script>

</body>

</html>
