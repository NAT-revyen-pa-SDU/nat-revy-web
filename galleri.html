<!DOCTYPE html>
<html lang="da">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Galleri - NAT Revyen</title>
	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar"></div>

<section class="gallery-page">
	<div class="gallery-inner">
		<div class="gallery-header">
			<h2>Galleri</h2>
			<p>
				Her finder du et lille udklip af billeder fra forestillinger, intense oeveuger og sociale arrangementer i NAT Revyen.
			</p>
		</div>

		<div class="gallery-grid">
			<figure>
				<img src="images/slutsang_large.jpg" alt="Slutsang på scenen" loading="lazy">
			</figure>
			<figure>
				<img src="images/group.jpg" alt="Hele holdet samlet" loading="lazy">
			</figure>
			<figure>
				<img src="images/intensuge.jpg" alt="Intensuge med øvelser" loading="lazy">
			</figure>
			<figure>
				<img src="images/dyt-baat.jpg" alt="Sketch fra forestilling" loading="lazy">
			</figure>
			<figure>
				<img src="images/social.jpg" alt="Social hygge i foreningen" loading="lazy">
			</figure>
			<figure>
				<img src="images/startsang.jpg" alt="Startsang på scenen" loading="lazy">
			</figure>
			<figure>
				<img src="images/sommerfesthygge.jpg" alt="Sommerfest" loading="lazy">
			</figure>
			<figure>
				<img src="images/telephonos.jpg" alt="Nummer fra revyen" loading="lazy">
			</figure>
			<figure>
				<img src="images/bolo.jpg" alt="Scene fra forestilling" loading="lazy">
			</figure>
			<figure>
				<img src="images/intens2.jpg" alt="Revyhold under øvelse" loading="lazy">
			</figure>
			<figure>
				<img src="images/elonkeld.jpg" alt="Skuespiller på scenen" loading="lazy">
			</figure>
			<figure>
				<img src="images/klap.jpg" alt="Publikum klapper" loading="lazy">
			</figure>
		</div>
	</div>
</section>

<div id="footer"></div>

<script>
	document.addEventListener("DOMContentLoaded", () => {
		fetch("navbar.html")
			.then(response => response.text())
			.then(data => {
				document.getElementById("navbar").innerHTML = data;

				const hamburger = document.getElementById("hamburger");
				const mobileMenu = document.getElementById("mobileMenu");

				if (hamburger) {
					hamburger.addEventListener("click", () => {
						mobileMenu.classList.toggle("active");
					});
				}

				const links = document.querySelectorAll('.nav-links a');
				links.forEach(link => {
					if (link.textContent.trim().toLowerCase() === 'galleri') {
						link.classList.add('active');
					}
				});
			});

		fetch("footer.html")
			.then(response => response.text())
			.then(data => {
				document.getElementById("footer").innerHTML = data;
			});
	});
</script>

</body>
</html>
